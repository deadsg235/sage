<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="scene">
        <div class="avatar-wrap">
            <canvas id="aura-canvas"></canvas>
            <img id="sage-img" src="{{ url_for('static', filename='images/sage.png') }}" alt="SAGE">
            <div class="scan-line"></div>
        </div>

        <div class="hud-label">
            <span class="hud-title">S·A·G·E</span>
            <span class="hud-sub" id="hud-status">AWAITING INPUT</span>
        </div>
    </div>

    <div class="chat-panel" id="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="user-input" placeholder="Speak to Sage…" autocomplete="off">
            <button id="send-btn">&#9654;</button>
        </div>
    </div>

    <script>
        const SAGE_IMG_URL = "{{ url_for('static', filename='images/sage.png') }}";
    </script>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
